name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    name: Rust ${{ matrix.toolchain }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        toolchain: ["1.95.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      # ^ @master ref + explicit `toolchain` value means we install exactly
      # what the matrix says. Pin local installs via rust-toolchain.toml so
      # local + CI run the same clippy/rustfmt and lints don't drift.
      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features
      - name: cargo test (default features)
        run: cargo test --all-targets
      - name: cargo test (--features bson)
        run: cargo test --all-targets --features bson
      - name: cargo doc
        run: cargo doc --no-deps --all-features
      - name: example builds
        run: |
          cargo build --release --example basic
          cargo build --release --example bench
      - name: bench smoke (100k docs)
        run: cargo run --release --example bench

  python:
    name: Python SDK
    runs-on: ${{ matrix.os }}
    needs: rust
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: python
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: build wheel + run tests
        working-directory: python
        # `maturin develop` insists on an active virtualenv; create a
        # throwaway one inside the package directory and activate it for
        # the duration of this step.
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip maturin pydantic
          maturin develop --release
          python tests/test_smoke.py
          python tests/test_orm.py
          python tests/test_v0_2_0.py

  node:
    name: Node SDK
    runs-on: ${{ matrix.os }}
    needs: rust
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [18, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: node
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: npm install
        working-directory: node
        run: npm install
      - name: build native module
        working-directory: node
        run: npx napi build --release --strip
      - name: smoke test
        working-directory: node
        run: npm test
